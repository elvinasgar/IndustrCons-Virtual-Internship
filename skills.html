<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — IndustrCons IRE-3</title>
<link rel="icon" type="image/svg+xml" href="assets/icons/mark.svg">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ic_theme') || 'light');</script>
<link rel="stylesheet" href="css/core.css"><link rel="stylesheet" href="css/components.css">
</head>
<body data-page="skills">
<div class="app-shell">
  <div id="sidebarInclude"></div>
  <div class="main-content" id="main">
    <h1 style="font-size:var(--step-2);">Skills</h1>
    <p style="max-width:640px;">Every skill tag comes from a task you've actually completed — this isn't a self-assessment, it's a log.</p>
    <div id="skillGrid" class="grid" style="grid-template-columns:repeat(2,1fr); gap:14px; margin-top:18px;"></div>
    <div id="emptySkills" class="empty-state" hidden>
      <div class="icon">📐</div>
      <p>Complete a task in any internship to start building your skill log.</p>
      <a class="btn btn-primary" href="internships.html">Browse internships</a>
    </div>
  </div>
</div>
<script src="js/i18n.js"></script><script src="js/storage.js"></script><script src="js/main.js"></script>
<script>
(async function () {
  const state = IC.store.getState();
  const ids = Object.keys(state.internships);
  if (ids.length === 0) { document.getElementById('emptySkills').hidden = false; return; }

  const skillCounts = {};
  for (const id of ids) {
    const rec = state.internships[id];
    const doneCount = Object.keys(rec.tasksDone).length;
    if (doneCount === 0) continue;
    try {
      const meta = await fetch(`data/internships/${id}.json`).then(r => r.ok ? r.json() : null);
      if (!meta) continue;
      meta.tasks.forEach(t => {
        if (rec.tasksDone[t.id]) {
          // credit the internship's overall skill tags proportionally to tasks actually done
          meta.skills.forEach(s => { skillCounts[s] = (skillCounts[s] || 0) + 1; });
        }
      });
    } catch (e) { /* internship json not found, skip */ }
  }

  const entries = Object.entries(skillCounts).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) { document.getElementById('emptySkills').hidden = false; return; }

  const max = entries[0][1];
  const grid = document.getElementById('skillGrid');
  entries.forEach(([skill, count]) => {
    const pct = Math.round((count / max) * 100);
    const el = document.createElement('div');
    el.className = 'card';
    el.style.padding = '16px';
    el.innerHTML = `
      <div class="flex between" style="margin-bottom:8px;"><strong>${skill}</strong><span class="mono" style="font-size:.78rem;">${count} task${count===1?'':'s'}</span></div>
      <div class="progress"><span style="width:${pct}%;"></span></div>`;
    grid.appendChild(el);
  });
})();
</script>
</body>
</html>
