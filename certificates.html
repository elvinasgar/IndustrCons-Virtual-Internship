<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates — IndustrCons IRE-3</title>
<link rel="icon" type="image/svg+xml" href="assets/icons/mark.svg">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ic_theme') || 'light');</script>
<link rel="stylesheet" href="css/core.css"><link rel="stylesheet" href="css/components.css">
</head>
<body data-page="certificates">
<div class="app-shell">
  <div id="sidebarInclude"></div>
  <div class="main-content" id="main">
    <h1 style="font-size:var(--step-2);">Your Certificates</h1>
    <p>Every certificate you've earned, stored locally in this browser.</p>
    <div id="certGrid" class="grid" style="grid-template-columns:repeat(3,1fr); gap:16px; margin-top:16px;"></div>
    <div id="emptyCerts" class="empty-state" hidden>
      <div class="icon">🏅</div>
      <p>No certificates yet — finish an internship's quiz to unlock one.</p>
      <a class="btn btn-primary" href="internships.html">Browse internships</a>
    </div>
  </div>
</div>
<script src="js/i18n.js"></script><script src="js/storage.js"></script><script src="js/main.js"></script>
<script>
(async function(){
  const state = IC.store.getState();
  const index = await fetch('data/internships/index.json').then(r=>r.json());
  const grid = document.getElementById('certGrid');
  const completed = Object.entries(state.internships).filter(([,r]) => r.status === 'completed');
  if (completed.length === 0) { document.getElementById('emptyCerts').hidden = false; return; }
  completed.forEach(([id, rec]) => {
    const meta = index.find(i => i.id === id);
    const el = document.createElement('a');
    el.href = `certificate.html?internshipId=${id}`;
    el.className = 'card card-hover';
    el.style.padding = '20px';
    el.innerHTML = `
      <span class="badge badge-green">Completed</span>
      <h4 style="margin:10px 0 4px;">${meta ? meta.title : id}</h4>
      <p style="font-size:.84rem; margin:0;">${meta ? meta.company : ''}</p>
      <div class="mono" style="font-size:.76rem; margin-top:10px; color:var(--ink-soft);">${rec.certNo}</div>`;
    grid.appendChild(el);
  });
})();
</script>
</body>
</html>
